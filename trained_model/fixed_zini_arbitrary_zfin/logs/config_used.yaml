paths:
  checkpoints: /home/kangyq/HunDun_proj/projects/model_11_zdep_l2loss/checkpoints
  data: /home/kangyq/HunDun_proj/projects/model_11_zdep_l2loss/data
  logs: /home/kangyq/HunDun_proj/projects/model_11_zdep_l2loss/logs
  root: /home/kangyq/HunDun_proj/projects/model_11_zdep_l2loss
project:
  base_dir: /home/kangyq/HunDun_proj/projects
  device: cuda
  log_to_file: false
  name: model_11_zdep_l2loss
  seed: 42
  use_timestamp_log: false
stage1_dataset:
  class: DispZdepDataset
  module: dataset.disp_zdep_dataset
  params:
    data_dir: data/stage1
    dtype_str: float32
    sample_mode: random
    sample_size: 100000
    target: dpos
stage1_eval:
  class: EvalStage1
  module: evaluation.eval_disp_zdep
  params:
    checkpoint_path: checkpoints/stage1/best_model.pt
    grid_size: 256
    plot_out_dir: results_stage1
    projection_plane: XY
    sample_percent: 100
    slice_range:
    - 40
    - 45
stage1_loss:
  class: MSELoss
  module: torch.nn
  params: {}
stage1_model:
  class: PerParticleCondDisplacement
  module: models.stage1
  params:
    depth: 6
    dropout: 0.0
    hidden_dim: 256
    pos_fourier_bands: 8
    pos_include_input: true
    time_dim: 128
    use_pos_fourier: true
stage1_optimizer:
  name: AdamW
  params:
    lr: 0.001
    weight_decay: 0.0001
stage1_output:
  function: output_stage
  module: utils.output_stage_zdep
  out_dir: data/stage1_output
stage1_prepare:
  function: prepare_disp_zdep
  module: data_prepare.prepare_disp_zdep
  params:
    out_dir: data/stage1
    recompute: false
  params_loading:
    out_dir: data/stage1
stage1_scheduler:
  name: StepLR
  params:
    gamma: 0.5
    step_size: 50
stage1_train:
  batch_size: 1
  checkpoint_dir: checkpoints/stage1
  early_stopping_patience: 20
  epoch_size: 150
  epochs: 1000
  eval_every: 5
  num_workers: 4
  resume: true
  save_every: 50
  start_epoch: 0
  trainer_class: Trainer
  trainer_module: trainer.disp_zdep_trainer
stage2_dataset:
  class: WindowDensityZDepDataset
  module: dataset.dens_3d_dataset_zdep
  params:
    data_type: rho
    dtype: float32
    out_dir: data/stage2_windows
    transform: default
stage2_eval:
  class: EvalStage2ZDep
  module: evaluation.eval_zdep
  params:
    ckpt_stage2_path: checkpoints/stage2/best_model.pt
    grid_size_pk: 256
    kbins: 40
    out_dir: data/eval_stage2
    projection_plane: XY
    slice_range:
    - 0
    - 64
stage2_local_files:
  file_dir_train:
  - - /home/kangyq/Nbody_sim/sim_512_500/rho_grid256_256dens/nbody_1/
  - - /home/kangyq/Nbody_sim/sim_512_500/rho_grid256_256dens/nbody_2/
