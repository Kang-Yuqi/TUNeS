  - - rho_014.h5
  - - rho_015.h5
stage2_loss:
  class: EdgeWeightedLoss
  module: loss_fn.filter_box_loss
  params:
    base: l2
    inner_frac: 0.8
    min_w: 0.2
    weight_mode: center
stage2_model:
  class: UNet3D
  module: models.stage2
  params:
    base_ch: 16
    emb_dim: 64
    fixed_z0: true
    in_ch: 1
    levels: 4
    norm: group
    out_ch: 1
    residual: true
    use_se: true
    z_cond: true
stage2_optimizer:
  name: AdamW
  params:
    lr: 0.0001
    weight_decay: 0.0001
stage2_prepare:
  function: prepare_window_3d_dens
  module: data_prepare.prepare_window_from_pos_zdep
  params:
    Nw: 128
    alpha: 1.0
    box_size: 500
    device: cuda
    dtype: float32
    grid_res: 256
    out_dir: data/stage2_windows
    recompute: false
    stage_source_dir: data/stage1_output
    step: 64
    transform: asinh
  params_loading:
    fin_local_key: stage2_local_files
    map_prev_j_to_fin: true
    out_dir: data/stage2_pairs
    prev_glob: '*_pred.h5'
    stage_source_dir: data/stage1_output
    use_prev_stage_output: true
stage2_scheduler:
  name: CosineAnnealingLR
  params:
    T_max: 200
    eta_min: 1.0e-07
stage2_train:
  batch_size: 1
  checkpoint_dir: checkpoints/stage2
  collate_fn:
    function: collate_window_zdep_batch
    module: dataset.dens_3d_dataset_zdep
  early_stopping_patience: 200
  epoch_size: 500
  epochs: 8000
  eval_every: 5
  fixed_z0: true
  num_workers: 0
  resume: true
  save_every: 100
  start_epoch: 0
  trainer_class: Trainer
  trainer_module: trainer.trainer_3d_dens_zdep
  trainer_params:
    accum_steps: 1
    amp_dtype: bf16
    fixed_z0: true
    use_amp: true
    z_key0: z0
    z_key1: z1
    zdep: true
  zdep: true
